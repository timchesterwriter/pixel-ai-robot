<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL AI: Локальное зрение + ESP32 (исправлено)</title>
    <!-- Transformers.js для запуска моделей в браузере -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1"></script>
    <style>
        :root { --neon: #ffaa00; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
        #terminal { flex: 1; padding: 20px; overflow-y: auto; font-size: 14px; line-height: 1.5; border-bottom: 1px solid #222; }
        .controls { padding: 20px; background: #111; display: flex; flex-direction: column; gap: 10px; }
        input, select { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 5px; outline: none; }
        button { padding: 15px; background: var(--neon); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; color: #000; }
        .sys { color: #00d2ff; }
        .ai { color: #fff; border-left: 2px solid var(--neon); padding-left: 10px; margin: 5px 0; }
        .user { color: #ff00e5; }
        .cmd { color: #00ff9d; font-weight: bold; }
        .esp-connected { color: #00ff9d; }
        .esp-disconnected { color: #ff4757; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        #progress { width: 100%; height: 4px; background: #333; margin-top: 10px; display: none; }
        #progress-bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.3s; }
        
        /* ESP32 Connection Panel */
        #espPanel {
            padding: 15px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            display: none;
        }
        
        .esp-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .esp-btn {
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            color: var(--neon);
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }
        
        .esp-btn:hover {
            background: #333;
            border-color: var(--neon);
        }
    </style>
</head>
<body>

<div style="padding: 10px; font-size: 12px; background: #111;">
    STATUS: <span id="st">READY</span> | ESP32: <span id="espStatus" class="esp-disconnected">DISCONNECTED</span> | CAMERA: <span id="camStatus" class="esp-disconnected">OFF</span> | МОДЕЛЬ: <span id="modelStatus">не загружена</span> <span class="blink">_</span>
</div>

<div id="terminal"></div>
<div id="progress"><div id="progress-bar"></div></div>

<!-- Setup Panel -->
<div class="controls" id="setup">
    <select id="modelSelect">
        <option value="Xenova/qwen2-vl-2b-instruct">Qwen2-VL-2B-Instruct (2GB, рекомендуется)</option>
        <option value="Xenova/phi-3-vision-128k-instruct">Phi-3-Vision-128k (2.5GB)</option>
        <option value="Xenova/blip-image-captioning-base">BLIP (базовое описание, легче)</option>
    </select>
    <input type="text" id="ip" placeholder="IP Робота (ESP32)">
    <button onclick="boot()">ЗАГРУЗИТЬ МОДЕЛЬ И ЗАПУСТИТЬ</button>
</div>

<!-- ESP32 Control Panel -->
<div id="espPanel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div>ESP32 CONTROLS:</div>
        <button onclick="testESP32Connection()" style="padding: 8px 12px; font-size: 12px;">🔧 TEST</button>
    </div>
    
    <div class="esp-controls">
        <div class="esp-btn" onclick="sendESP32Command('LED_ON')">💡 ON</div>
        <div class="esp-btn" onclick="sendESP32Command('LED_OFF')">💡 OFF</div>
        <div class="esp-btn" onclick="sendESP32Command('MOVE_FORWARD|50|2000')">⬆ FWD</div>
        <div class="esp-btn" onclick="sendESP32Command('STOP')">⏹ STOP</div>
        <div class="esp-btn" onclick="sendESP32Command('MOVE_BACKWARD|30|1000')">⬇ BACK</div>
        <div class="esp-btn" onclick="sendESP32Command('ROTATE_LEFT|90|50')">↶ LEFT</div>
        <div class="esp-btn" onclick="sendESP32Command('ROTATE_RIGHT|90|50')">↷ RIGHT</div>
        <div class="esp-btn" onclick="sendESP32Command('DANCE_1')">🕺 1</div>
        <div class="esp-btn" onclick="sendESP32Command('DANCE_2')">💃 2</div>
        <div class="esp-btn" onclick="sendESP32Command('DANCE_3')">👯 3</div>
        <div class="esp-btn" onclick="sendESP32Command('REMOTECONTROL_MODE')">🎮 REMOTE</div>
        <div class="esp-btn" onclick="sendESP32Command('WAIT_2')">⏱ WAIT 2s</div>
    </div>
</div>

<script>
    (function() {
        // Проверка загрузки Transformers.js
        if (!self.transformers) {
            alert("Ошибка: Transformers.js не загрузился. Проверьте интернет-соединение или обновите страницу.");
            return;
        }
    })();

    const term = document.getElementById('terminal');
    const st = document.getElementById('st');
    const espStatus = document.getElementById('espStatus');
    const camStatus = document.getElementById('camStatus');
    const modelStatus = document.getElementById('modelStatus');
    const espPanel = document.getElementById('espPanel');
    const setupPanel = document.getElementById('setup');
    const progressDiv = document.getElementById('progress');
    const progressBar = document.getElementById('progress-bar');
    
    let config = { 
        modelId: 'Xenova/qwen2-vl-2b-instruct',
        ip: '', 
        active: false,
        espConnected: false,
        pipeline: null
    };

    // Camera related variables
    let videoStream = null;
    let videoElement = null;
    let canvas = null;
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.continuous = false;

    // Чёрный пиксель 1x1 в формате dataURL (заглушка для модели, если камера недоступна)
    const BLACK_PIXEL_DATAURL = 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAABAAEDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8QAFQEBAQAAAAAAAAAAAAAAAAAAAAX/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCwAA8A/9k=';

    function log(msg, cl = '') {
        const d = document.createElement('div');
        if(cl) d.className = cl;
        d.innerHTML = `> ${msg}`;
        term.appendChild(d);
        term.scrollTop = term.scrollHeight;
    }

    // === КАМЕРА: запрос разрешения и инициализация ===
    async function initCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            log("✅ Камера инициализирована", "sys");
            camStatus.textContent = "ON";
            camStatus.className = "esp-connected";
            
            videoElement = document.createElement('video');
            videoElement.srcObject = videoStream;
            videoElement.play();
            videoElement.style.display = 'none';
            document.body.appendChild(videoElement);
            
            canvas = document.createElement('canvas');
            canvas.style.display = 'none';
            document.body.appendChild(canvas);
        } catch (err) {
            log("❌ Не удалось получить доступ к камере: " + err.message, "sys");
            camStatus.textContent = "OFF";
            camStatus.className = "esp-disconnected";
            videoStream = null;
        }
    }

    // Захват текущего кадра с камеры и возврат dataURL
    async function captureImage() {
        if (!videoElement || !canvas || videoElement.readyState < 2) {
            return null;
        }
        
        const maxWidth = 640;
        let width = videoElement.videoWidth;
        let height = videoElement.videoHeight;
        
        if (width === 0 || height === 0) return null;
        
        if (width > maxWidth) {
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
        }
        
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(videoElement, 0, 0, width, height);
        
        return canvas.toDataURL('image/jpeg', 0.8);
    }

    // === ЗАГРУЗКА ЛОКАЛЬНОЙ МОДЕЛИ ===
    async function loadModel(modelId) {
        log(`⏳ Загрузка модели ${modelId}... Это может занять несколько минут при первом запуске.`, "sys");
        modelStatus.textContent = "загрузка...";
        progressDiv.style.display = 'block';
        
        try {
            // Получаем pipeline из глобального объекта transformers (без большой буквы)
            const { pipeline } = self.transformers;
            
            // Определяем задачу в зависимости от модели
            let task = 'image-to-text';
            if (modelId.includes('blip')) {
                task = 'image-to-text';
            } else {
                // Для vision-language моделей используем 'image-to-text', он должен работать
                task = 'image-to-text';
            }
            
            config.pipeline = await pipeline(task, modelId, {
                progress_callback: (progress) => {
                    if (progress.status === 'progress') {
                        const percent = (progress.loaded / progress.total) * 100;
                        progressBar.style.width = percent + '%';
                    }
                }
            });
            
            log(`✅ Модель ${modelId} загружена`, "sys");
            modelStatus.textContent = "готова";
            progressDiv.style.display = 'none';
            return true;
        } catch (error) {
            log(`❌ Ошибка загрузки модели: ${error.message}`, "sys");
            modelStatus.textContent = "ошибка";
            progressDiv.style.display = 'none';
            return false;
        }
    }

    // === ОСНОВНАЯ ЛОГИКА ===
    async function boot() {
        config.modelId = document.getElementById('modelSelect').value;
        config.ip = document.getElementById('ip').value.trim();
        
        setupPanel.style.display = 'none';
        config.active = true;
        
        log("Инициализация системы с локальным зрением...", "sys");
        
        // Загружаем модель
        const modelLoaded = await loadModel(config.modelId);
        if (!modelLoaded) {
            log("❌ Не удалось загрузить модель. Перезагрузите страницу и попробуйте другую.", "sys");
            return;
        }
        
        // Запрашиваем доступ к камере
        await initCamera();
        
        // Проверяем подключение к ESP32 если указан IP
        if(config.ip) {
            await connectToESP32();
        }
        
        speak("Система активирована. Жду команды.", startWaitingForName);
    }

    async function connectToESP32() {
        log(`Проверяю подключение к ESP32: ${config.ip}`, "sys");
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            
            await fetch(`http://${config.ip}/ping`, {
                method: 'GET',
                mode: 'no-cors',
                signal: controller.signal
            }).catch(() => null);
            
            clearTimeout(timeoutId);
            
            config.espConnected = true;
            espStatus.textContent = "CONNECTED";
            espStatus.className = "esp-connected";
            espPanel.style.display = 'block';
            
            log("✅ Успешно подключено к ESP32!", "sys");
            speak("Подключение к роботу установлено.");
            
        } catch (error) {
            log("❌ Не удалось подключиться к ESP32", "sys");
            log("Команды будут выводиться только в терминал", "sys");
            espStatus.textContent = "ERROR";
        }
    }

    async function testESP32Connection() {
        if(!config.ip) return;
        
        log("Тестирую подключение к ESP32...", "sys");
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            
            await fetch(`http://${config.ip}/ping`, {
                method: 'GET',
                mode: 'no-cors',
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            log("✅ ESP32 отвечает на запросы", "sys");
            espStatus.textContent = "CONNECTED";
            espStatus.className = "esp-connected";
            config.espConnected = true;
            
        } catch (error) {
            log("❌ ESP32 не отвечает", "sys");
            espStatus.textContent = "DISCONNECTED";
            espStatus.className = "esp-disconnected";
            config.espConnected = false;
        }
    }

    function sendESP32Command(command) {
        if(!config.espConnected || !config.ip) {
            log(`❌ Нет подключения к ESP32 - команда "${command}" не отправлена`, "sys");
            return;
        }
        
        fetch(`http://${config.ip}/command`, {
            method: 'POST',
            mode: 'no-cors',
            body: command
        }).catch(error => {
            console.error("Ошибка отправки команды:", error);
        });
        
        log(`📤 Команда отправлена на ESP32: ${command}`, "sys");
    }

    // Этап 1: Ожидание активационного имени "Пиксель"
    function startWaitingForName() {
        if(!config.active) return;
        st.innerText = "LISTENING (NAME)";
        st.style.color = "#ffaa00";

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript.toLowerCase();
            log(`<span class="user">Слышу: "${text}"</span>`);
            
            if (text.includes("пиксель") || text.includes("pixel")) {
                handleTrigger();
            } else {
                safeRestart();
            }
        };

        recognition.onend = () => { 
            if(st.innerText === "LISTENING (NAME)") safeRestart(); 
        };
        
        try { 
            recognition.start(); 
        } catch(e) {
            console.error("Ошибка запуска распознавания:", e);
            setTimeout(safeRestart, 100);
        }
    }

    // Этап 2: Реакция на имя и ожидание самой команды
    function handleTrigger() {
        st.innerText = "REPLYING";
        const reply = "Слушаю тебя!";
        log(`PIXEL: ${reply}`, "sys");
        
        speak(reply, () => {
            st.innerText = "LISTENING (CMD)";
            log("Говорите команду...", "sys");
            
            recognition.onresult = (event) => {
                const cmdText = event.results[0][0].transcript;
                log(`<span class="user">ЗАПРОС: "${cmdText}"</span>`);
                askTrinity(cmdText);
            };
            
            recognition.onend = () => { 
                if(st.innerText === "LISTENING (CMD)") safeRestart(); 
            };
            
            try { 
                recognition.start(); 
            } catch(e) {
                safeRestart();
            }
        });
    }

    // Этап 3: Запрос к локальной модели (с изображением)
    async function askTrinity(prompt) {
        st.innerText = "THINKING";
        log("Анализирую локальной моделью...", "sys");

        // Захватываем изображение с камеры, если доступно, иначе используем заглушку
        let imageDataUrl = await captureImage();
        if (!imageDataUrl) {
            log("📸 Камера недоступна, использую заглушку", "sys");
            imageDataUrl = BLACK_PIXEL_DATAURL; // чёрный пиксель
        } else {
            log("📸 Кадр с камеры захвачен", "sys");
        }

        try {
            if (!config.pipeline) {
                throw new Error("Модель не загружена");
            }
            
            // Системный промпт (как в оригинале)
            const systemPrompt = `Ты робот Пиксель. Отвечай кратко и по делу. Отвечай ТОЛЬКО на русском языке.

Тебе может быть предоставлено изображение с камеры робота. 
- Если пользователь спрашивает о том, что робот видит (например: "что ты видишь?", "какая обстановка?", "есть ли препятствие?", "что перед тобой?"), используй информацию из изображения для ответа.
- Если вопрос не связан с визуальной информацией, отвечай как обычно, НЕ упоминая наличие фото и не описывая его.

Доступные команды для управления роботом:
1. ДВИЖЕНИЕ:
   - MOVE_FORWARD|SPEED|TIME - вперед (скорость 0-100, время в мс)
   - MOVE_BACKWARD|SPEED|TIME - назад
   - ROTATE_LEFT|DEGREES|SPEED - поворот налево (градусы, скорость 0-100)
   - ROTATE_RIGHT|DEGREES|SPEED - поворот направо
   - STOP - полная остановка
   - TURN|DEGREES| - повернуться на градусы (использует гироскоп)

2. РЕЖИМЫ:
   - REMOTECONTROL_MODE - режим дистанционного управления
   - DANCE_1 - танец номер 1
   - DANCE_2 - танец номер 2
   - DANCE_3 - танец номер 3
   - DANCE_1,2,3 - несколько танцев сразу

3. УТИЛИТЫ:
   - LED_ON - включить светодиод на ESP32
   - LED_OFF - выключить светодиод
   - WAIT_5 - ждать 5 секунд (может быть любое число)

Формат ответа строго такой:
Text: [твой текстовый ответ на русском языке]
Commands: [команды через запятую или null]

Пример:
Пользователь: "Поезди вперед и поверни налево"
Ответ: 
Text: Еду вперед и поворачиваю налево.
Commands: MOVE_FORWARD|50|2000, ROTATE_LEFT|90|50

ВНИМАНИЕ:
1. Команды НЕ озвучиваются, только пишутся в терминал
2. Всегда отвечай на русском
3. Не используй смайлики в тексте
4. Если команда не нужна - пиши Commands: null
5. Для ожидания используй WAIT_<секунды>`;

            // Полный текст запроса: системный промпт + вопрос пользователя
            const fullPrompt = `${systemPrompt}\n\nПользователь: ${prompt}\nОтвет:`;

            let output;
            
            // Для BLIP (описательная модель) используем отдельную логику
            if (config.modelId.includes('blip')) {
                // BLIP возвращает только описание изображения, не умеет отвечать на вопросы.
                // Получим описание и вставим его в ответ.
                const result = await config.pipeline(imageDataUrl);
                const description = result[0]?.generated_text || "не удалось описать";
                output = `Text: Я вижу: ${description}. ${prompt}\nCommands: null`;
            } else {
                // Для vision-language моделей передаём изображение и текст.
                // В Transformers.js pipeline('image-to-text') ожидает: (image, options)
                // options могут содержать поле 'text' для промпта.
                const result = await config.pipeline(imageDataUrl, {
                    text: fullPrompt,
                    max_new_tokens: 256,
                    temperature: 0.6,
                });
                // result может быть строкой или массивом
                output = typeof result === 'string' ? result : (result[0]?.generated_text || result);
            }

            // Парсим ответ модели (ожидаем формат Text: ... Commands: ...)
            const txtMatch = output.match(/Text:\s*(.*?)(?:\nCommands:|$)/is);
            const txt = txtMatch ? txtMatch[1].trim() : output;
            
            const cmdMatch = output.match(/Commands:\s*(.*)/i);
            let cmds = cmdMatch ? cmdMatch[1].trim() : "null";
            cmds = cmds.replace(/\s+/g, '').toUpperCase();
            
            log(`PIXEL: ${txt}`, "ai");
            
            if (cmds !== "NULL" && cmds !== "") {
                const commands = cmds.split(',').filter(cmd => cmd.trim() !== '');
                commands.forEach(cmd => {
                    log(`<span class="cmd">>>> КОМАНДА: ${cmd}</span>`, "sys");
                    if(config.espConnected && config.ip) {
                        sendESP32Command(cmd.trim());
                    }
                });
            }

            speak(txt, startWaitingForName);

        } catch (e) {
            log("ОШИБКА: " + e.message, "sys");
            speak("Произошла ошибка при обработке запроса", startWaitingForName);
        }
    }

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        msg.rate = 0.9;
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function safeRestart() {
        if(config.active) {
            setTimeout(() => { 
                try { 
                    recognition.start(); 
                } catch(e) {
                    console.error("Failed to restart recognition:", e);
                } 
            }, 100);
        }
    }

    window.addEventListener('beforeunload', () => {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
        }
    });
</script>
</body>
</html>
