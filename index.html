<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Voice Chat - Рабочая версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .header h1 {
            color: #495057;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🎤";
            font-size: 28px;
        }

        .api-section {
            padding: 20px 30px;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: monospace;
            transition: border-color 0.3s;
            min-width: 250px;
        }

        .api-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .api-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f3f5;
            color: #495057;
        }

        .api-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .api-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .chat-container {
            padding: 30px;
            background: #f8f9fa;
        }

        .conversation {
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .assistant-message {
            background: #e9ecef;
            color: #495057;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .interim-message {
            color: #868e96;
            font-style: italic;
            padding: 5px 10px;
            font-size: 14px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #495057;
            font-size: 14px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #adb5bd;
        }

        .status-indicator.connected {
            background: #40c057;
            box-shadow: 0 0 10px #40c057;
            animation: pulse 2s infinite;
        }

        .status-indicator.speaking {
            background: #fa5252;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
            justify-content: center;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            flex: 1;
            justify-content: center;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .debug-panel {
            margin-top: 15px;
            padding: 10px;
            background: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #868e96;
            font-size: 12px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gemini Live Voice Chat</h1>
        </div>

        <div class="api-section">
            <div class="api-input-group">
                <input type="password" id="apiKey" class="api-input" placeholder="Введите ваш Gemini API ключ" value="">
                <button id="saveKeyBtn" class="btn btn-secondary">Сохранить</button>
                <div id="apiStatus" class="api-status">⚪ Ключ не сохранен</div>
            </div>
            <div class="info-text" style="font-size: 12px; color: #666; margin-top: 5px;">
                API ключ хранится только в вашем браузере
            </div>
        </div>

        <div class="chat-container">
            <div class="status-bar">
                <div class="status-text">
                    <span id="statusIndicator" class="status-indicator"></span>
                    <span id="statusMessage">Ожидание подключения</span>
                </div>
                <div id="tokenInfo" style="font-size: 12px;">⚡ 0 / 1M TPM</div>
            </div>

            <div class="conversation" id="conversation">
                <div class="message assistant-message">
                    👋 Привет! Вставьте API ключ и нажмите "Начать разговор"
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn btn-primary" disabled>
                    <span>🎤</span> Начать разговор
                </button>
                <button id="stopBtn" class="btn btn-danger" disabled>
                    <span>⏹️</span> Остановить
                </button>
            </div>

            <div class="debug-panel" id="debugPanel">
                [System] Готов к работе
            </div>
        </div>

        <div class="footer">
            Gemini 2.5 Flash Native Audio Dialog • Рабочая версия
        </div>
    </div>

    <script>
        class GeminiVoiceChat {
            constructor() {
                this.apiKey = localStorage.getItem('gemini_api_key') || '';
                this.ws = null;
                this.isConnected = false;
                this.isSpeaking = false;
                this.audioContext = null;
                this.audioStream = null;
                this.processor = null;
                this.source = null;
                this.audioQueue = [];
                this.isPlaying = false;
                
                // DOM элементы
                this.apiKeyInput = document.getElementById('apiKey');
                this.saveKeyBtn = document.getElementById('saveKeyBtn');
                this.apiStatus = document.getElementById('apiStatus');
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.conversation = document.getElementById('conversation');
                this.statusIndicator = document.getElementById('statusIndicator');
                this.statusMessage = document.getElementById('statusMessage');
                this.debugPanel = document.getElementById('debugPanel');
                this.tokenInfo = document.getElementById('tokenInfo');

                // Инициализация
                this.init();
            }

            log(message) {
                const time = new Date().toLocaleTimeString();
                this.debugPanel.innerHTML += `<div>[${time}] ${message}</div>`;
                this.debugPanel.scrollTop = this.debugPanel.scrollHeight;
                console.log(`[Gemini] ${message}`);
            }

            init() {
                if (this.apiKey) {
                    this.apiKeyInput.value = '•'.repeat(40);
                    this.updateApiStatus('✅ Ключ сохранен', 'connected');
                    this.startBtn.disabled = false;
                }

                this.saveKeyBtn.addEventListener('click', () => this.saveApiKey());
                this.startBtn.addEventListener('click', () => this.startChat());
                this.stopBtn.addEventListener('click', () => this.stopChat());

                this.apiKeyInput.addEventListener('focus', () => {
                    if (this.apiKey) {
                        this.apiKeyInput.value = '';
                        this.apiKeyInput.type = 'text';
                    }
                });

                this.apiKeyInput.addEventListener('blur', () => {
                    if (this.apiKey) {
                        this.apiKeyInput.value = '•'.repeat(40);
                        this.apiKeyInput.type = 'password';
                    }
                });
            }

            updateApiStatus(text, className = '') {
                this.apiStatus.textContent = text;
                this.apiStatus.className = 'api-status';
                if (className) {
                    this.apiStatus.classList.add(className);
                }
            }

            saveApiKey() {
                const key = this.apiKeyInput.value.trim();
                if (key && key.length > 20) {
                    this.apiKey = key;
                    localStorage.setItem('gemini_api_key', key);
                    this.apiKeyInput.value = '•'.repeat(40);
                    this.updateApiStatus('✅ Ключ сохранен', 'connected');
                    this.startBtn.disabled = false;
                    this.log('API ключ сохранен');
                } else {
                    this.updateApiStatus('❌ Неверный ключ', 'error');
                }
            }

            addMessage(role, text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
                messageDiv.textContent = text;
                this.conversation.appendChild(messageDiv);
                this.conversation.scrollTop = this.conversation.scrollHeight;
            }

            async startChat() {
                if (!this.apiKey) {
                    this.updateApiStatus('❌ Сначала сохраните API ключ', 'error');
                    return;
                }

                try {
                    this.log('Запрашиваю доступ к микрофону...');
                    
                    // Запрашиваем микрофон с правильными настройками для Gemini
                    this.audioStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            channelCount: 1,
                            sampleRate: 16000,
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        } 
                    });

                    this.log('✅ Микрофон получен');

                    // Создаем аудио контекст с правильной частотой
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000,
                        latencyHint: 'interactive'
                    });

                    await this.audioContext.resume();
                    this.log('✅ Аудио контекст создан');

                    // Создаем источник
                    this.source = this.audioContext.createMediaStreamSource(this.audioStream);
                    
                    // Создаем процессор для отправки аудио в реальном времени
                    const bufferSize = 4096;
                    this.processor = this.audioContext.createScriptProcessor(bufferSize, 1, 1);
                    
                    this.source.connect(this.processor);
                    this.processor.connect(this.audioContext.destination);

                    // Подключаемся к WebSocket
                    await this.setupWebSocket();

                    // Настраиваем отправку аудио
                    this.processor.onaudioprocess = (e) => {
                        if (this.ws && this.ws.readyState === WebSocket.OPEN && this.isConnected) {
                            const inputData = e.inputBuffer.getChannelData(0);
                            
                            // Конвертируем Float32 в Int16 для Gemini
                            const int16Data = new Int16Array(inputData.length);
                            for (let i = 0; i < inputData.length; i++) {
                                int16Data[i] = Math.max(-32768, Math.min(32767, inputData[i] * 32768));
                            }

                            // Отправляем аудио в правильном формате
                            const audioMessage = {
                                realtime_input: {
                                    media_chunks: [{
                                        data: btoa(String.fromCharCode(...new Uint8Array(int16Data.buffer))),
                                        mime_type: "audio/pcm"
                                    }]
                                }
                            };

                            this.ws.send(JSON.stringify(audioMessage));
                        }
                    };

                    this.isConnected = true;
                    this.startBtn.disabled = true;
                    this.stopBtn.disabled = false;
                    this.statusIndicator.classList.add('connected');
                    this.statusMessage.textContent = 'Подключено';
                    
                    this.addMessage('assistant', '🟢 Подключение установлено! Говорите со мной...');
                    this.log('✅ Сессия начата');

                } catch (error) {
                    this.log(`❌ Ошибка: ${error.message}`);
                    this.addMessage('assistant', '❌ Ошибка: ' + error.message);
                }
            }

            async setupWebSocket() {
                return new Promise((resolve, reject) => {
                    try {
                        // Правильный URL для Gemini Live API
                        const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${this.apiKey}`;
                        
                        this.ws = new WebSocket(wsUrl);

                        this.ws.onopen = () => {
                            this.log('✅ WebSocket подключен');
                            
                            // Отправляем конфигурацию в правильном формате
                            const setupMessage = {
                                setup: {
                                    model: "models/gemini-2.0-flash-exp", // Используем стабильную модель
                                    generation_config: {
                                        response_modalities: ["AUDIO"],
                                        temperature: 0.7,
                                        top_p: 0.95,
                                        top_k: 40
                                    },
                                    system_instruction: {
                                        parts: [{
                                            text: "Ты дружелюбный голосовой помощник. Отвечай кратко и естественно, как в разговоре."
                                        }]
                                    }
                                }
                            };
                            
                            this.ws.send(JSON.stringify(setupMessage));
                            this.log('📤 Конфигурация отправлена');
                            resolve();
                        };

                        this.ws.onmessage = (event) => {
                            const response = JSON.parse(event.data);
                            this.handleGeminiResponse(response);
                        };

                        this.ws.onerror = (error) => {
                            this.log(`❌ WebSocket ошибка: ${JSON.stringify(error)}`);
                            reject(error);
                        };

                        this.ws.onclose = (event) => {
                            this.log(`🔴 WebSocket закрыт: код ${event.code}, причина: ${event.reason}`);
                            if (this.isConnected) {
                                this.stopChat();
                            }
                        };

                    } catch (error) {
                        reject(error);
                    }
                });
            }

            handleGeminiResponse(response) {
                // Обрабатываем подтверждение setup
                if (response.setupComplete) {
                    this.log('✅ Конфигурация принята');
                    return;
                }

                // Обрабатываем транскрипцию речи пользователя
                if (response.serverContent?.interrupted) {
                    this.log('⏸️ Пользователь прервал ответ');
                }

                if (response.serverContent?.turnComplete) {
                    this.isSpeaking = false;
                    this.statusIndicator.classList.remove('speaking');
                }

                if (response.serverContent?.modelTurn) {
                    this.isSpeaking = true;
                    this.statusIndicator.classList.add('speaking');
                    
                    // Обрабатываем части ответа
                    response.serverContent.modelTurn.parts.forEach(part => {
                        // Текстовая транскрипция
                        if (part.text) {
                            this.addMessage('assistant', part.text);
                            this.log(`🤖 Ответ: ${part.text.substring(0, 50)}...`);
                        }
                        
                        // Аудио данные
                        if (part.inlineData) {
                            this.log(`🔊 Получен аудио ответ (${part.inlineData.mimeType})`);
                            this.playAudioResponse(part.inlineData.data);
                        }
                    });
                }

                // Транскрипция речи пользователя
                if (response.serverContent?.inputTranscription) {
                    const text = response.serverContent.inputTranscription.text;
                    if (text) {
                        this.addMessage('user', text);
                        this.log(`🗣️ Распознано: ${text}`);
                    }
                }

                // Информация о токенах
                if (response.usageMetadata) {
                    const usage = response.usageMetadata;
                    this.tokenInfo.textContent = `⚡ ${usage.totalTokens || 0} / 1M TPM`;
                }
            }

            playAudioResponse(base64Data) {
                try {
                    // Декодируем base64 в аудио данные
                    const binaryString = atob(base64Data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    // Воспроизводим аудио
                    this.audioContext.decodeAudioData(bytes.buffer, (buffer) => {
                        const source = this.audioContext.createBufferSource();
                        source.buffer = buffer;
                        source.connect(this.audioContext.destination);
                        source.start();
                        this.log('🔊 Воспроизвожу ответ');
                    });
                } catch (error) {
                    this.log(`❌ Ошибка воспроизведения: ${error.message}`);
                }
            }

            stopChat() {
                this.log('🛑 Останавливаю сессию...');

                // Останавливаем процессор
                if (this.processor) {
                    this.processor.disconnect();
                }

                // Останавливаем источник
                if (this.source) {
                    this.source.disconnect();
                }

                // Закрываем аудио контекст
                if (this.audioContext) {
                    this.audioContext.close();
                }

                // Останавливаем микрофон
                if (this.audioStream) {
                    this.audioStream.getTracks().forEach(track => track.stop());
                }

                // Закрываем WebSocket
                if (this.ws) {
                    this.ws.close();
                }

                // Обновляем UI
                this.isConnected = false;
                this.isSpeaking = false;
                this.startBtn.disabled = false;
                this.stopBtn.disabled = true;
                this.statusIndicator.classList.remove('connected', 'speaking');
                this.statusMessage.textContent = 'Отключено';

                this.addMessage('assistant', '🔴 Разговор завершен');
                this.log('✅ Сессия остановлена');
            }
        }

        // Запускаем приложение
        const chat = new GeminiVoiceChat();
    </script>
</body>
</html>
