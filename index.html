<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI Chat с фото — исправлено</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .app {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            background: white;
            border-radius: 36px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #10a37f;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            flex: 1;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .token-info {
            background: #e6f7f0;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #0f5e47;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #cbd5e1;
        }

        .token-text {
            font-family: monospace;
            background: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8fafc;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
        }

        .user-message {
            background: #10a37f;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .message-image {
            max-width: 180px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .typing {
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            align-self: flex-start;
            display: flex;
            gap: 5px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #10a37f;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-8px); }
        }

        .input-area {
            background: white;
            padding: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .image-preview {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #10a37f;
            flex-shrink: 0;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-img {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid white;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f1f5f9;
            border-radius: 30px;
            padding: 4px 4px 4px 16px;
        }

        textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 0.95rem;
            resize: none;
            max-height: 80px;
            outline: none;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #10a37f;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn.secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .hidden {
            display: none;
        }

        .debug-info {
            background: #fff3cd;
            color: #856404;
            padding: 8px 16px;
            font-size: 0.8rem;
            border-bottom: 1px solid #ffeeba;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🤖 Бесплатный AI</h1>
            <div class="badge">Работает!</div>
        </div>

        <div class="token-info">
            <span>🔑 Токен:</span>
            <span class="token-text">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</span>
        </div>

        <div class="debug-info" id="debugInfo">
            ⚡ Отправьте фото для теста
        </div>

        <div class="messages" id="messages">
            <div class="message ai-message">
                👋 Привет! Я ИИ от Hugging Face.<br><br>
                📸 <strong>Отправь фото</strong> — я опишу что на нём<br>
                💬 Можно добавить вопрос к фото<br><br>
                <small>✅ Токен уже встроен</small><br>
                <small>🔄 Если ошибка — просто повторите запрос</small>
            </div>
        </div>

        <div class="input-area">
            <div class="image-preview" id="imagePreview"></div>
            
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Вопрос к фото (необязательно)..." rows="1" oninput="autoResize(this)"></textarea>
                <button class="action-btn secondary" onclick="triggerImageUpload()">
                    📷
                </button>
                <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                <button class="action-btn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== ВАШ ТОКЕН ====================
        const HF_TOKEN = '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';
        
        // ==================== STATE ====================
        let uploadedImages = [];
        let requestCount = 0;

        // ==================== UI FUNCTIONS ====================
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function addMessage(type, text, imgUrl = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type === 'user' ? 'user-message' : 'ai-message'}`;
            
            let content = '';
            if (imgUrl) {
                content += `<img src="${imgUrl}" class="message-image">`;
            }
            content += text.replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function updateDebug(message, isError = false) {
            const debug = document.getElementById('debugInfo');
            debug.innerHTML = `⚡ ${message}`;
            debug.style.background = isError ? '#f8d7da' : '#fff3cd';
            debug.style.color = isError ? '#721c24' : '#856404';
        }

        // ==================== IMAGE HANDLING ====================
        function triggerImageUpload() {
            document.getElementById('imageUpload').click();
        }

        function handleImageUpload(input) {
            const files = Array.from(input.files);
            
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadedImages.push(e.target.result);
                        updateImagePreviews();
                        updateDebug(`✅ Фото загружено: ${file.name}`);
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            input.value = '';
        }

        function updateImagePreviews() {
            const container = document.getElementById('imagePreview');
            
            if (uploadedImages.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            uploadedImages.forEach((img, index) => {
                html += `
                    <div class="preview-item">
                        <img src="${img}">
                        <div class="remove-img" onclick="removeImage(${index})">×</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImagePreviews();
        }

        // ==================== HUGGING FACE API (ИСПРАВЛЕНО) ====================
        async function analyzeImage(imageBase64) {
            updateDebug('🔄 Отправка запроса к Hugging Face...');
            
            // Правильный формат для Hugging Face Inference API
            // Нужно отправить изображение как бинарные данные, а не JSON
            const base64Data = imageBase64.split(',')[1];
            
            // Декодируем base64 в бинарные данные
            const binaryData = atob(base64Data);
            const array = new Uint8Array(binaryData.length);
            for (let i = 0; i < binaryData.length; i++) {
                array[i] = binaryData.charCodeAt(i);
            }
            
            try {
                // Используем другой endpoint и формат
                const response = await fetch('https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-base', {
                    headers: {
                        'Authorization': `Bearer ${HF_TOKEN}`,
                        'Content-Type': 'application/octet-stream'  // Важно: бинарные данные!
                    },
                    method: 'POST',
                    body: array.buffer  // Отправляем как ArrayBuffer
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const result = await response.json();
                updateDebug('✅ Запрос выполнен успешно!');
                
                // BLIP возвращает массив с generated_text
                if (Array.isArray(result) && result.length > 0) {
                    return result[0].generated_text || 'Описание не получено';
                } else if (result.generated_text) {
                    return result.generated_text;
                } else {
                    return 'Не удалось распознать изображение';
                }
                
            } catch (error) {
                updateDebug(`❌ Ошибка: ${error.message}`, true);
                throw error;
            }
        }

        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const text = document.getElementById('userInput').value.trim();
            
            if (uploadedImages.length === 0) {
                updateDebug('❌ Сначала выберите фото!', true);
                return;
            }

            // Добавляем сообщение пользователя
            addMessage('user', text || '📷 Опиши это фото', uploadedImages[0]);

            // Очищаем input
            document.getElementById('userInput').value = '';
            
            // Показываем индикатор
            showTyping();

            try {
                // Анализируем изображение
                const description = await analyzeImage(uploadedImages[0]);
                
                let response = `📷 **Описание фото:**\n${description}`;
                
                if (text) {
                    response += `\n\n💬 **На вопрос:** "${text}"\n\nИзвините, для ответов на вопросы по фото нужна модель VQA. Пока только описание изображения.`;
                }
                
                hideTyping();
                addMessage('ai', response);
                
                // Очищаем фото после успешной отправки
                uploadedImages = [];
                updateImagePreviews();
                updateDebug('✅ Готово! Можно отправлять следующее фото');

            } catch (error) {
                hideTyping();
                let errorMessage = error.message;
                
                if (errorMessage.includes('503')) {
                    errorMessage = '⏳ Модель загружается... Подождите 10 секунд и попробуйте снова! (первый запрос всегда долгий)';
                } else if (errorMessage.includes('401')) {
                    errorMessage = '❌ Ошибка авторизации. Проверьте токен.';
                }
                
                addMessage('ai', `❌ ${errorMessage}`);
            }
        }

        // Тестируем соединение при загрузке
        window.addEventListener('load', () => {
            updateDebug('✅ Готов к работе! Выберите фото и отправьте');
            
            // Проверяем доступность API
            fetch('https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-base', {
                headers: { 'Authorization': `Bearer ${HF_TOKEN}` },
                method: 'GET'
            })
            .then(response => {
                if (response.ok) {
                    updateDebug('✅ API доступен, можно отправлять фото');
                } else {
                    updateDebug('⚠️ API отвечает, но может быть медленным');
                }
            })
            .catch(err => {
                updateDebug('⚠️ Проверка API не удалась, но попробуйте отправить фото');
            });
        });
    </script>
</body>
</html>
