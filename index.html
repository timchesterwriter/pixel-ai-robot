<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Voice Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .header h1 {
            color: #495057;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🎤";
            font-size: 28px;
        }

        .api-section {
            padding: 20px 30px;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: monospace;
            transition: border-color 0.3s;
            min-width: 250px;
        }

        .api-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .api-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f3f5;
            color: #495057;
        }

        .api-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .api-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .chat-container {
            padding: 30px;
            background: #f8f9fa;
        }

        .conversation {
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .assistant-message {
            background: #e9ecef;
            color: #495057;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .interim-message {
            color: #868e96;
            font-style: italic;
            padding: 5px 10px;
            font-size: 14px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #495057;
            font-size: 14px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #adb5bd;
        }

        .status-indicator.active {
            background: #40c057;
            box-shadow: 0 0 10px #40c057;
            animation: pulse 2s infinite;
        }

        .status-indicator.listening {
            background: #fa5252;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
            justify-content: center;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            flex: 1;
            justify-content: center;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .mic-visualization {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 30px;
            margin: 10px 0;
        }

        .mic-bar {
            width: 4px;
            height: 15px;
            background: #667eea;
            border-radius: 2px;
            transition: height 0.2s;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #868e96;
            font-size: 12px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .info-text {
            font-size: 12px;
            color: #868e96;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gemini Live Voice Chat</h1>
        </div>

        <div class="api-section">
            <div class="api-input-group">
                <input type="password" id="apiKey" class="api-input" placeholder="Введите ваш Gemini API ключ" value="">
                <button id="saveKeyBtn" class="btn btn-secondary">Сохранить</button>
                <div id="apiStatus" class="api-status">Ключ не сохранен</div>
            </div>
            <div class="info-text">
                API ключ хранится только в вашем браузере и не отправляется на сторонние сервера
            </div>
        </div>

        <div class="chat-container">
            <div class="status-bar">
                <div class="status-text">
                    <span id="statusIndicator" class="status-indicator"></span>
                    <span id="statusMessage">Ожидание подключения</span>
                </div>
                <div id="tokenInfo">0 / 1M TPM</div>
            </div>

            <div class="mic-visualization" id="micViz" style="display: none;">
                <div class="mic-bar" style="height: 8px;"></div>
                <div class="mic-bar" style="height: 12px;"></div>
                <div class="mic-bar" style="height: 10px;"></div>
                <div class="mic-bar" style="height: 15px;"></div>
                <div class="mic-bar" style="height: 7px;"></div>
                <div class="mic-bar" style="height: 20px;"></div>
                <div class="mic-bar" style="height: 12px;"></div>
            </div>

            <div class="conversation" id="conversation">
                <div class="message assistant-message">
                    👋 Привет! Я готов к разговору. Вставь API ключ и нажми "Начать разговор"
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn btn-primary" disabled>
                    <span>🎤</span> Начать разговор
                </button>
                <button id="stopBtn" class="btn btn-danger" disabled>
                    <span>⏹️</span> Остановить
                </button>
            </div>
        </div>

        <div class="footer">
            Использует Gemini 2.5 Flash Native Audio Dialog • 
            <a href="#" id="clearKey">Очистить ключ</a>
        </div>
    </div>

    <script>
        class GeminiVoiceChat {
            constructor() {
                this.apiKey = localStorage.getItem('gemini_api_key') || '';
                this.ws = null;
                this.isConnected = false;
                this.isListening = false;
                this.mediaRecorder = null;
                this.audioContext = null;
                this.analyser = null;
                this.audioStream = null;
                
                // DOM элементы
                this.apiKeyInput = document.getElementById('apiKey');
                this.saveKeyBtn = document.getElementById('saveKeyBtn');
                this.apiStatus = document.getElementById('apiStatus');
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.conversation = document.getElementById('conversation');
                this.statusIndicator = document.getElementById('statusIndicator');
                this.statusMessage = document.getElementById('statusMessage');
                this.micViz = document.getElementById('micViz');
                this.clearKeyBtn = document.getElementById('clearKey');

                // Инициализация
                this.init();
            }

            init() {
                // Загружаем сохраненный ключ
                if (this.apiKey) {
                    this.apiKeyInput.value = '•'.repeat(40);
                    this.updateApiStatus('Ключ сохранен', 'connected');
                    this.startBtn.disabled = false;
                }

                // Обработчики событий
                this.saveKeyBtn.addEventListener('click', () => this.saveApiKey());
                this.startBtn.addEventListener('click', () => this.startChat());
                this.stopBtn.addEventListener('click', () => this.stopChat());
                this.clearKeyBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.clearApiKey();
                });

                // При фокусе на поле ключа показываем пустое поле для ввода
                this.apiKeyInput.addEventListener('focus', () => {
                    if (this.apiKey) {
                        this.apiKeyInput.value = '';
                        this.apiKeyInput.type = 'text';
                    }
                });

                this.apiKeyInput.addEventListener('blur', () => {
                    if (this.apiKey) {
                        this.apiKeyInput.value = '•'.repeat(40);
                        this.apiKeyInput.type = 'password';
                    }
                });
            }

            updateApiStatus(text, className = '') {
                this.apiStatus.textContent = text;
                this.apiStatus.className = 'api-status';
                if (className) {
                    this.apiStatus.classList.add(className);
                }
            }

            saveApiKey() {
                const key = this.apiKeyInput.value.trim();
                if (key && key.length > 20) { // Простая проверка длины ключа
                    this.apiKey = key;
                    localStorage.setItem('gemini_api_key', key);
                    this.apiKeyInput.value = '•'.repeat(40);
                    this.updateApiStatus('Ключ сохранен', 'connected');
                    this.startBtn.disabled = false;
                } else {
                    this.updateApiStatus('Неверный ключ', 'error');
                }
            }

            clearApiKey() {
                this.apiKey = '';
                localStorage.removeItem('gemini_api_key');
                this.apiKeyInput.value = '';
                this.updateApiStatus('Ключ не сохранен');
                this.startBtn.disabled = true;
                if (this.isConnected) {
                    this.stopChat();
                }
            }

            async startChat() {
                if (!this.apiKey) {
                    this.updateApiStatus('Сначала сохраните API ключ', 'error');
                    return;
                }

                try {
                    // Запрашиваем доступ к микрофону
                    this.audioStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        } 
                    });

                    // Настраиваем WebSocket соединение
                    await this.setupWebSocket();

                    // Настраиваем запись аудио
                    this.setupAudioRecording();

                    // Обновляем UI
                    this.isConnected = true;
                    this.startBtn.disabled = true;
                    this.stopBtn.disabled = false;
                    this.statusIndicator.classList.add('active');
                    this.statusMessage.textContent = 'Подключено, слушаю...';
                    
                    this.addMessage('assistant', '🟢 Подключение установлено! Говорите со мной...');

                } catch (error) {
                    console.error('Ошибка при старте:', error);
                    this.addMessage('assistant', '❌ Ошибка: ' + error.message);
                    this.statusMessage.textContent = 'Ошибка подключения';
                }
            }

            async setupWebSocket() {
                // Формируем URL для WebSocket соединения с Gemini API
                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${this.apiKey}`;
                
                this.ws = new WebSocket(wsUrl);

                this.ws.onopen = () => {
                    console.log('WebSocket подключен');
                    
                    // Отправляем конфигурацию
                    const setupMessage = {
                        setup: {
                            model: "models/gemini-2.5-flash-native-audio-dialog",
                            generation_config: {
                                response_modalities: ["AUDIO"],
                                temperature: 0.7,
                            },
                            input_audio_transcription: {
                                enabled: true
                            },
                            output_audio_transcription: {
                                enabled: true
                            }
                        }
                    };
                    
                    this.ws.send(JSON.stringify(setupMessage));
                };

                this.ws.onmessage = (event) => {
                    const response = JSON.parse(event.data);
                    this.handleGeminiResponse(response);
                };

                this.ws.onerror = (error) => {
                    console.error('WebSocket ошибка:', error);
                    this.addMessage('assistant', '❌ Ошибка WebSocket соединения');
                };

                this.ws.onclose = () => {
                    console.log('WebSocket закрыт');
                    if (this.isConnected) {
                        this.stopChat();
                    }
                };

                // Ждем открытия соединения
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Таймаут подключения')), 5000);
                    this.ws.onopen = () => {
                        clearTimeout(timeout);
                        resolve();
                    };
                    this.ws.onerror = () => {
                        clearTimeout(timeout);
                        reject(new Error('Не удалось подключиться'));
                    };
                });
            }

            setupAudioRecording() {
                if (!this.audioStream) return;

                // Настройка анализатора для визуализации
                this.audioContext = new AudioContext();
                this.analyser = this.audioContext.createAnalyser();
                const source = this.audioContext.createMediaStreamSource(this.audioStream);
                source.connect(this.analyser);
                
                // Запускаем визуализацию
                this.micViz.style.display = 'flex';
                this.startVisualization();

                // Настраиваем MediaRecorder для отправки аудио
                this.mediaRecorder = new MediaRecorder(this.audioStream, {
                    mimeType: 'audio/webm;codecs=opus'
                });

                this.mediaRecorder.ondataavailable = async (event) => {
                    if (event.data.size > 0 && this.ws && this.ws.readyState === WebSocket.OPEN) {
                        // Конвертируем audio/webm в audio/pcm (упрощенно)
                        const buffer = await event.data.arrayBuffer();
                        
                        // Отправляем аудио чанк в Gemini
                        const message = {
                            realtime_input: {
                                media_chunks: [{
                                    data: btoa(String.fromCharCode(...new Uint8Array(buffer))),
                                    mime_type: "audio/pcm"
                                }]
                            }
                        };
                        
                        this.ws.send(JSON.stringify(message));
                    }
                };

                // Отправляем аудио каждые 100мс
                this.mediaRecorder.start(100);
                this.isListening = true;
                this.statusIndicator.classList.add('listening');
            }

            startVisualization() {
                if (!this.analyser) return;

                const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                const bars = document.querySelectorAll('.mic-bar');

                const updateVisualization = () => {
                    if (!this.isListening || !this.analyser) return;
                    
                    this.analyser.getByteFrequencyData(dataArray);
                    
                    bars.forEach((bar, index) => {
                        if (index < dataArray.length) {
                            const value = dataArray[index] / 255 * 30;
                            bar.style.height = Math.max(5, value) + 'px';
                        }
                    });
                    
                    requestAnimationFrame(updateVisualization);
                };

                updateVisualization();
            }

            handleGeminiResponse(response) {
                console.log('Ответ от Gemini:', response);

                // Обрабатываем транскрипцию речи пользователя
                if (response.serverContent?.inputTranscription) {
                    const text = response.serverContent.inputTranscription.text;
                    if (text) {
                        this.addMessage('user', text);
                    }
                }

                // Обрабатываем ответ модели
                if (response.serverContent?.outputTranscription) {
                    const text = response.serverContent.outputTranscription.text;
                    if (text) {
                        this.addMessage('assistant', text);
                    }
                }

                // Обрабатываем аудио ответ (воспроизводим)
                if (response.serverContent?.modelTurn?.parts) {
                    response.serverContent.modelTurn.parts.forEach(part => {
                        if (part.inlineData?.data) {
                            // В реальном приложении здесь нужно воспроизводить аудио
                            // Для упрощения просто логируем
                            console.log('Получен аудио ответ');
                        }
                    });
                }
            }

            addMessage(role, text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
                messageDiv.textContent = text;
                this.conversation.appendChild(messageDiv);
                this.conversation.scrollTop = this.conversation.scrollHeight;
            }

            stopChat() {
                // Останавливаем запись
                if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                    this.mediaRecorder.stop();
                }

                // Закрываем аудио контекст
                if (this.audioContext) {
                    this.audioContext.close();
                }

                // Останавливаем все треки микрофона
                if (this.audioStream) {
                    this.audioStream.getTracks().forEach(track => track.stop());
                }

                // Закрываем WebSocket
                if (this.ws) {
                    this.ws.close();
                }

                // Обновляем UI
                this.isConnected = false;
                this.isListening = false;
                this.startBtn.disabled = false;
                this.stopBtn.disabled = true;
                this.statusIndicator.classList.remove('active', 'listening');
                this.statusMessage.textContent = 'Отключено';
                this.micViz.style.display = 'none';

                this.addMessage('assistant', '🔴 Разговор завершен');
            }
        }

        // Запускаем приложение
        const chat = new GeminiVoiceChat();
    </script>
</body>
</html>
